<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfa Bulunamadı - NexaWeather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-box {
            background: rgba(30, 30, 50, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .error-icon {
            font-size: 72px;
            margin-bottom: 12px;
        }

        .error-number {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            margin: 8px 0 12px 0;
        }

        .error-desc {
            color: #b0b0cc;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .error-btn:active {
            transform: scale(0.95);
        }

        .error-btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-left: 8px;
        }

        .error-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="error-box">
        <div class="error-icon">🔍</div>
        <div class="error-number">404</div>
        <h1 class="error-title">Sayfa Bulunamadı</h1>
        <p class="error-desc">
            Üzgünüz, aradığınız sayfa mevcut değil veya taşınmış olabilir.
        </p>
        <div class="error-buttons">
            <a href="../index.html" class="error-btn">🏠 Ana Sayfa</a>
            <a href="../pages/contact.html" class="error-btn error-btn-secondary">📧 İletişim</a>
        </div>
    </div>

</body>
</html>
