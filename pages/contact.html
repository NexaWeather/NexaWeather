<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaWeather - İletişim</title>
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('nexa_theme')||'dark');</script>
    <link rel="stylesheet" href="../style.css" />
    <style>
        .contact-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 0;
        }
        .contact-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .contact-card h2 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        .contact-card p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 16px;
        }
        .contact-item:last-child {
            border-bottom: none;
        }
        .contact-item .icon {
            font-size: 24px;
            width: 40px;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            background: var(--gradient);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: var(--transition);
        }
        .back-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <div class="contact-card">
            <h2>📬 İletişim</h2>
            <p>
                Sorularınız, önerileriniz veya geri bildirimleriniz için
                bana aşağıdaki kanallardan ulaşabilirsiniz.
            </p>

            <div class="contact-item">
                <span class="icon">📧</span>
                <span><strong>E-posta:</strong> <a href="mailto:destek@nexaweather.com">destek@nexaweather.com</a></span>
            </div>
            <div class="contact-item">
                <span class="icon">📱</span>
                <span><strong>Telefon:</strong> <a href="tel:+905384322906">0538 432 29 06</a></span>
            </div>
            <div class="contact-item">
                <span class="icon">📍</span>
                <span><strong>Konum:</strong> Adana, Türkiye</span>
            </div>
        </div>

        <a href="../index.html" class="back-btn">🏠 Ana Sayfaya Dön</a>
    </div>
</body>
</html>
